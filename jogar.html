<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Match ou Desmatch - Jogar</title>

  <link rel="stylesheet" href="./estilos/style2.css">

  <!-- Ícones -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >

  <link rel="icon" type="image/png" href="Captura_de_tela_2026-05-09_164629-removebg-preview (1).png">

  <link rel="manifest" href="manifest.json">

  <meta name="theme-color" content="#ff006e">

  <style>

    /* POPUP CONFIG */

    .popup-config{

      position: fixed;

      top: 0;

      left: 0;

      width: 100%;

      height: 100%;

      background: rgba(0,0,0,0.6);

      display: none;

      justify-content: center;

      align-items: center;

      z-index: 999;

    }

    .popup-config.active{

      display: flex;

    }

    .popup-box{

      background: #1e1e1e;

      padding: 30px;

      border-radius: 15px;

      display: flex;

      flex-direction: column;

      gap: 15px;

      width: 300px;

      text-align: center;

    }

    .popup-box h3{

      color: white;

      margin: 0;

    }

    .popup-btn{

      padding: 12px;

      border: none;

      border-radius: 10px;

      cursor: pointer;

      font-size: 16px;

    }

    .delete-btn{

      background: red;

      color: white;

    }

    .popup-close{

      padding: 10px;

      border: none;

      border-radius: 10px;

      cursor: pointer;

    }

  </style>

</head>

<body>

  <!-- MENU LATERAL -->
  <div class="sidebar" id="sidebar">

    <div class="sidebar-top">

      <button id="closeMenu">
        <i class="fa-solid fa-xmark"></i>
      </button>

    </div>

    <div class="sidebar-links">

      <a href="#" id="openConfig">
        Configurações
      </a>

      <a href="sobre.html">
        Sobre nós
      </a>

      <a href="#">
        Contate-nos
      </a>

    </div>

  </div>

  <!-- POPUP -->
  <div class="popup-config" id="configPopup">

    <div class="popup-box">

      <h3>Configurações</h3>

      <button class="popup-btn" id="logoutBtn">
        Sair do jogo
      </button>

      <button class="popup-btn delete-btn" id="deleteAccountBtn">
        Excluir conta
      </button>

      <button class="popup-close" id="closePopup">
        Fechar
      </button>

    </div>

  </div>

  <!-- CONTAINER -->
  <div class="container">

    <!-- TOPO -->
    <header>

      <button class="menu-btn" id="openMenu">

        <i class="fa-solid fa-bars"></i>

      </button>

      <div class="logo">

        <img
          src="Captura_de_tela_2026-05-09_164629-removebg-preview (1).png"
          alt=""
          class="logo-img"
        >

      </div>

    </header>

    <!-- CONTEÚDO -->
    <main>

      <h2>JOGUE AGORA</h2>

      <!-- CRIAR SALA -->
      <button class="btn" id="createRoomBtn">
        CRIAR SALA
      </button>

      <div class="divider">
        <span>OU</span>
      </div>

      <!-- ABRIR INPUT -->
      <button class="btn" id="openRoomInput">
        ENTRE EM UMA SALA
      </button>

      <!-- INPUT -->
      <div class="room-box" id="roomBox">

        <input
          type="text"
          class="room-input"
          id="roomCodeInput"
          placeholder="Digite o código da sala"
        >

        <div class="room-buttons">

          <button
            class="small-btn confirm-btn"
            id="joinRoomBtn"
          >
            ENTRAR
          </button>

          <button
            class="small-btn cancel-btn"
            id="closeRoomInput"
          >
            FECHAR
          </button>

        </div>

      </div>

    </main>

  </div>

  <!-- SCRIPT MENU -->
  <script>

    const sidebar = document.getElementById("sidebar");

    const openMenu = document.getElementById("openMenu");

    const closeMenu = document.getElementById("closeMenu");

    openMenu.addEventListener("click", () => {

      sidebar.classList.add("active");

    });

    closeMenu.addEventListener("click", () => {

      sidebar.classList.remove("active");

    });

    // INPUT DA SALA

    const openRoomInput = document.getElementById("openRoomInput");

    const closeRoomInput = document.getElementById("closeRoomInput");

    const roomBox = document.getElementById("roomBox");

    openRoomInput.addEventListener("click", () => {

      roomBox.classList.add("active");

    });

    closeRoomInput.addEventListener("click", () => {

      roomBox.classList.remove("active");

    });

    // CONFIGURAÇÕES

    const openConfig = document.getElementById("openConfig");

    const configPopup = document.getElementById("configPopup");

    const closePopup = document.getElementById("closePopup");

    const logoutBtn = document.getElementById("logoutBtn");

    const deleteAccountBtn = document.getElementById("deleteAccountBtn");

    // ABRIR POPUP

    openConfig.addEventListener("click", () => {

      configPopup.classList.add("active");

      sidebar.classList.remove("active");

    });

    // FECHAR POPUP

    closePopup.addEventListener("click", () => {

      configPopup.classList.remove("active");

    });

    // SAIR DO JOGO

    logoutBtn.addEventListener("click", () => {

      alert("Você saiu do jogo");

      window.location.href = "index.html";

    });

    // EXCLUIR CONTA

    deleteAccountBtn.addEventListener("click", () => {

      const confirmar = confirm("Tem certeza que deseja excluir sua conta?");

      if(confirmar){

        alert("Conta excluída");

      }

    });

  </script>

  <!-- FIREBASE -->
  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {

      getFirestore,
      doc,
      setDoc,
      getDoc,
      updateDoc

    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    import {

      getAuth

    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // CONFIG FIREBASE

    const firebaseConfig = {

      apiKey: "AIzaSyA_UWA9DlrnbVlSNQrTBkZANiviRO5-vnI",

      authDomain: "match-ou-desmatch.firebaseapp.com",

      projectId: "match-ou-desmatch",

      storageBucket: "match-ou-desmatch.firebasestorage.app",

      messagingSenderId: "256858416779",

      appId: "1:256858416779:web:19c260ba183886a7c2d68e"

    };

    // INICIALIZA

    const app = initializeApp(firebaseConfig);

    const db = getFirestore(app);

    const auth = getAuth(app);

    // ELEMENTOS

    const createRoomBtn = document.getElementById("createRoomBtn");

    const joinRoomBtn = document.getElementById("joinRoomBtn");

    const roomCodeInput = document.getElementById("roomCodeInput");

    // GERAR CÓDIGO

    function generateRoomCode(){

      return Math.random()
        .toString(36)
        .substring(2, 7)
        .toUpperCase();

    }

    // CRIAR SALA

    createRoomBtn.addEventListener("click", async () => {

      const user = auth.currentUser;

      if(!user){

        alert("Usuário não autenticado");

        return;

      }

      const roomCode = generateRoomCode();

      await setDoc(doc(db, "rooms", roomCode), {

        status: "waiting",

        host: user.uid,

        players: {

          [user.uid]: {

            email: user.email

          }

        }

      });

      window.location.href = `sala.html?room=${roomCode}`;

    });

    // ENTRAR NA SALA

    joinRoomBtn.addEventListener("click", async () => {

      const roomCode = roomCodeInput.value.toUpperCase();

      const user = auth.currentUser;

      if(!user){

        alert("Usuário não autenticado");

        return;

      }

      const roomRef = doc(db, "rooms", roomCode);

      const roomSnap = await getDoc(roomRef);

      // SALA NÃO EXISTE

      if(!roomSnap.exists()){

        alert("Sala não encontrada");

        return;

      }

      const roomData = roomSnap.data();

      const players = roomData.players;

      // SALA CHEIA

      if(Object.keys(players).length >= 2){

        alert("Sala cheia");

        return;

      }

      // ADICIONA PLAYER

      players[user.uid] = {

        email: user.email

      };

      await updateDoc(roomRef, {

        players: players,

        status: "playing"

      });

      // REDIRECT

      window.location.href = `sala.html?room=${roomCode}`;

    });

  </script>

  <script>

    if ("serviceWorker" in navigator) {

      navigator.serviceWorker.register("./sw.js");

    }

  </script>

</body>
</html>
